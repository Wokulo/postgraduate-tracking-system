<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supervisor Login | Postgraduate Submissions Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <h1>Supervisor Login</h1>
        <p>Use your supervisor credentials to access the supervisor dashboard.</p>
      </div>
      <nav>
        <a href="login.html" class="button button-secondary">Back</a>
      </nav>
    </div>
  </header>

  <main class="container login-page">
    <section class="login-card">
      <h2>Supervisor Sign In</h2>
      <div id="errorMessage" class="error-message" style="display: none;"></div>
      <form id="supervisorLoginForm" action="#" method="post">
        <label for="supervisorEmail">Email Address</label>
        <input type="email" id="supervisorEmail" name="supervisorEmail" placeholder="supervisor@example.edu" required>

        <label for="supervisorPhone">Phone Number</label>
        <input type="tel" id="supervisorPhone" name="supervisorPhone" placeholder="+254 700 000 000" required>

        <label for="supervisorPassword">Password</label>
        <input type="password" id="supervisorPassword" name="supervisorPassword" placeholder="Enter your password" required>

        <button type="submit" class="button">Login as Supervisor</button>
      </form>
      <p class="note">Supervisor accounts are created before student onboarding begins.</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Postgraduate Submissions Tracker • Department of Pure and Applied Mathematics</p>
    </div>
  </footer>

  <script>
    const validateEmail = (email) => {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    };

    const validatePhone = (phone) => {
      const phoneRegex = /^[+]?[(]?[0-9]{1,4}[)]?[-\s.]?[(]?[0-9]{1,4}[)]?[-\s.]?[0-9]{1,9}$/;
      return phoneRegex.test(phone.replace(/\s/g, ''));
    };

    document.getElementById('supervisorLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('supervisorEmail').value.trim();
      const phone = document.getElementById('supervisorPhone').value.trim();
      const errorDiv = document.getElementById('errorMessage');
      
      // Reset error message
      errorDiv.style.display = 'none';
      errorDiv.textContent = '';
      
      let errors = [];
      
      if (!validateEmail(email)) {
        errors.push('Invalid email address. Please enter a valid email (e.g., supervisor@example.edu)');
      }
      
      if (!validatePhone(phone)) {
        errors.push('Invalid phone number. Please enter a valid phone number (e.g., +254 700 000 000)');
      }
      
      if (errors.length > 0) {
        errorDiv.textContent = errors.join(' • ');
        errorDiv.style.display = 'block';
        return;
      }
      
      window.location.href = 'supervisor-dashboard.html';
    });
  </script>
</body>
</html>
