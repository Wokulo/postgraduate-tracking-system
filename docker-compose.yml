version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: sts-db
    environment:
      POSTGRES_DB: student_tracking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/prisma-or-sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/prisma-or-sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d student_tracking"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sts-backend
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/student_tracking
      JWT_SECRET: replace_with_secure_secret
      JWT_EXPIRES_IN: 8h
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: npm run dev
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sts-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend

volumes:
  db_data:
  backend_node_modules:
  frontend_node_modules:
